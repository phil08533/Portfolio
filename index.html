<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Philip Gonzales | Portfolio</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <div class="container nav">
        <h1>Philip Gonzales</h1>
        <nav>
            <a href="#projects">Projects</a>
            <a href="resume/resume.pdf" target="_blank">Resume</a>
        </nav>
    </div>
</header>

<section class="hero container">
    <img src="headshot.png" class="headshot">
    <div>
        <h2>Cybersecurity & Software Developer</h2>
        <p>Building real-world tools, simulations, and platforms.</p>
    </div>
</section>

<section id="projects" class="container">
    <h2>Projects</h2>

    <div class="projects-grid">

        <div class="card" onclick="openModal('voidscroll')">
            <div class="image-container" data-folder="voidscroll"></div>
            <h3>VoidScroll</h3>
        </div>

        <div class="card" onclick="openModal('portal-music')">
            <div class="image-container" data-folder="portal-music"></div>
            <h3>Portal Music</h3>
        </div>

        <div class="card" onclick="openModal('riskvector')">
            <div class="image-container" data-folder="riskvector"></div>
            <h3>Risk Vector</h3>
        </div>

        <div class="card" onclick="openModal('ai-music')">
            <div class="image-container" data-folder="ai-music"></div>
            <h3>AI Music</h3>
        </div>

        <div class="card" onclick="openModal('pet-app')">
            <div class="image-container" data-folder="pet-app"></div>
            <h3>Lost Pet App</h3>
        </div>

        <div class="card" onclick="openModal('cyber-game')">
            <div class="image-container" data-folder="cyber-game"></div>
            <h3>Cybersecurity Game</h3>
        </div>

        <div class="card" onclick="openModal('movie-monster')">
            <div class="image-container" data-folder="movie-monster"></div>
            <h3>Movie Monster</h3>
        </div>

    </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modal-title"></h2>
        <p id="modal-description"></p>

        <div class="carousel">
            <button onclick="prevImage()">❮</button>
            <img id="carousel-image">
            <button onclick="nextImage()">❯</button>
        </div>
    </div>
</div>

<script>
const projects = {
    "voidscroll": {
        title: "VoidScroll",
        description: "Infinite scroll video platform with 30,000+ public domain videos. Built with pure HTML, CSS, JS, and runs as a PWA with no backend.",
        images: ["1.png","2.png","3.png"]
    },
    "portal-music": {
        title: "Portal Music",
        description: "Free music library for creators with zero copyright risk. Includes search, player, and client-side features.",
        images: ["1.png","2.png"]
    },
    "riskvector": {
        title: "Risk Vector",
        description: "Cyber attack simulator using Monte Carlo modeling to predict attack paths and financial impact.",
        images: ["1.png","2.png"]
    },
    "ai-music": {
        title: "AI Music Experiment",
        description: "Exploration into AI-generated music, publishing, and monetization.",
        images: ["creatitmusic.png"]
    },
    "pet-app": {
        title: "Lost Pet Finder",
        description: "Flask-based team project to connect lost pets with shelters and foster homes.",
        images: ["1.png"]
    },
    "cyber-game": {
        title: "Cybersecurity Game",
        description: "Interactive learning game with mini-games teaching cybersecurity concepts.",
        images: ["cybergame.png","cybergameoffice.png","cybergameofficeclose.png"]
    },
    "movie-monster": {
        title: "Movie Monster",
        description: "Movie tracking app using APIs, Google Sheets, and automation.",
        images: ["movie-monsteradd.png","movie-monstermain.png","movie-monstersort.png","moviemonsterinfo.png"]
    }
};

// LOAD FIRST IMAGE INTO CARDS
document.querySelectorAll(".image-container").forEach(container => {
    const folder = container.dataset.folder;
    const img = document.createElement("img");
    img.src = `projects/${folder}/${projects[folder].images[0]}`;
    container.appendChild(img);
});

let currentProject = null;
let currentIndex = 0;

function openModal(projectKey) {
    currentProject = projects[projectKey];
    currentIndex = 0;

    document.getElementById("modal-title").innerText = currentProject.title;
    document.getElementById("modal-description").innerText = currentProject.description;

    updateImage(projectKey);

    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function updateImage(projectKey) {
    const img = document.getElementById("carousel-image");
    img.src = `projects/${projectKey}/${currentProject.images[currentIndex]}`;
}

function nextImage() {
    currentIndex = (currentIndex + 1) % currentProject.images.length;
    updateImage(getKey());
}

function prevImage() {
    currentIndex = (currentIndex - 1 + currentProject.images.length) % currentProject.images.length;
    updateImage(getKey());
}

function getKey() {
    return Object.keys(projects).find(key => projects[key] === currentProject);
}
</script>

</body>
</html>
